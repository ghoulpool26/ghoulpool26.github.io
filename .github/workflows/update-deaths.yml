name: Update Deaths

on:
  schedule:
    - cron: '0 */1 * * *'  # every hour
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run death checker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-deaths.js

      - name: Commit deaths.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deaths.json
          git diff --cached --quiet || git commit -m "Update deaths.json"
          git push
